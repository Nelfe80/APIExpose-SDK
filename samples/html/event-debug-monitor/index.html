<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>APIExpose — Event Debug Monitor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <span id="dot" class="dot off"></span>
    <span id="status">connecting…</span>
    <span id="doctor"></span>
    <span class="spacer"></span>
    <button id="pause">Pause</button>
    <button id="clear">Clear</button>
  </header>
  <main>
    <table>
      <thead>
        <tr><th class="time">Time</th><th class="type">Type</th><th>Payload</th></tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </main>
  <script type="module" src="app.js"></script>
</body>
</html>
